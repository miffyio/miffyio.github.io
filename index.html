    <!-- Set the theme class before CSS paints to avoid a wrong-theme flash:
         saved preference > OS light preference > dark (the default) -->
    <script>
      (function () {
        var t = null;
        try {
          t = localStorage.getItem("theme");
        } catch (e) {}
        if (t !== "light" && t !== "dim" && t !== "dark") {
          t =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
        }
        document.documentElement.classList.add("theme-" + t);
      })();
    </script>
